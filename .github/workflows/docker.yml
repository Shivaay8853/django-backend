name: Build and Push Docker Images

on:
  push:
    branches:
       - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: |
          docker build -t shivaay8853/django-backend:latest ./backend

      - name: Push Backend
        run: |
          docker push shivaay8853/django-backend:latest

      - name: Build Frontend
        run: |
          docker build -t shivaay8853/react-frontend:latest ./frontend

      - name: Push Frontend 
        run: |
          docker push shivaay8853/react-frontend:latest
