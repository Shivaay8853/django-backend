services:
  backend:
    build:
      context: ./backend
    container_name: django-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: react-frontend
    ports:
      - "8087:80"
    depends_on:
      - backend
    restart: unless-stopped
